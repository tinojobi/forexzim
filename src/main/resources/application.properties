spring.application.name=forexzim

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/forexzim}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
# Treat existing databases (previously Hibernate-managed) as already at V1 baseline
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Seed data is in V3__seed_sources.sql — disable the legacy data.sql runner
spring.sql.init.mode=never

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=simple

# ── Scraping ──────────────────────────────────────────────────────────────────
# Interval between scrape runs in milliseconds (default: 30 minutes)
forexzim.scrape.interval-ms=${SCRAPE_INTERVAL_MS:1800000}
# How many days of rate history to keep (default: 7 days)
forexzim.scrape.retention-days=${SCRAPE_RETENTION_DAYS:7}

# ── Email alerts ──────────────────────────────────────────────────────────────
# Leave MAIL_USERNAME empty to disable email alerting
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
forexzim.alerts.from=${ALERTS_FROM_EMAIL:noreply@forexzim.co.zw}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.forexzim=INFO
logging.level.org.springframework.web=WARN

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8090}
