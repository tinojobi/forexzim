spring.application.name=zimrate

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/forexzim}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
# Treat existing databases (previously Hibernate-managed) as already at V1 baseline
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Seed data is in V3__seed_sources.sql — disable the legacy data.sql runner
spring.sql.init.mode=never

# ── Site ──────────────────────────────────────────────────────────────────────
zimrate.base-url=${BASE_URL:https://zimrate.com}

# ── Analytics & SEO ───────────────────────────────────────────────────────────
# Paste your GA4 Measurement ID (e.g. G-XXXXXXXXXX) to enable Google Analytics
zimrate.analytics.ga4-id=${GA4_MEASUREMENT_ID:G-XNK9RP5FBW}
# Paste the content value from the Google Search Console meta tag to verify ownership
zimrate.seo.search-console-verification=${SEARCH_CONSOLE_VERIFICATION:}

# ── Telegram ──────────────────────────────────────────────────────────────────
# Create a bot via @BotFather, add it as admin to your channel, then set these
zimrate.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
# Use your channel username (e.g. @zimrate) or numeric chat ID
zimrate.telegram.channel-id=${TELEGRAM_CHANNEL_ID:}

# ── Ads ───────────────────────────────────────────────────────────────────────
# Set ADS_ENABLED=false in your environment to hide all ad slots site-wide
zimrate.ads.enabled=${ADS_ENABLED:false}

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=caffeine
# Expire cached rates 5 minutes after write; eviction also happens after each scrape run
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# ── Scraping ──────────────────────────────────────────────────────────────────
# Interval between scrape runs in milliseconds (default: 30 minutes)
forexzim.scrape.interval-ms=${SCRAPE_INTERVAL_MS:1800000}
# How many days of rate history to keep (default: 7 days)
forexzim.scrape.retention-days=${SCRAPE_RETENTION_DAYS:365}

# ── Email alerts ──────────────────────────────────────────────────────────────
# Leave MAIL_USERNAME empty to disable email alerting
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
forexzim.alerts.from=${ALERTS_FROM_EMAIL:noreply@zimrate.com}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.forexzim=INFO
logging.level.org.springframework.web=WARN

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8090}
