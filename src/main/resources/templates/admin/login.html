<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — ZimRate Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="robots" content="noindex,nofollow">
</head>
<body>
<div class="login-page">
    <div class="login-card">

        <div class="login-logo">
            <img th:src="@{/logo.svg}" alt="ZimRate">
        </div>
        <div class="login-badge">
            <span>Admin Dashboard</span>
        </div>

        <h1>Welcome back</h1>
        <p class="login-sub">Sign in to manage ZimRate</p>

        <div th:if="${param.error}" class="login-error">
            <i class="fas fa-circle-exclamation"></i>
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="flash flash-success" style="margin-bottom:16px;">
            <i class="fas fa-check-circle"></i> You've been signed out.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username"
                       name="username" autocomplete="username"
                       placeholder="admin" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password"
                       name="password" autocomplete="current-password"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                <i class="fas fa-right-to-bracket"></i> Sign in
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--muted);">
            <a th:href="@{/}" style="color:var(--muted);">← Back to ZimRate</a>
        </p>
    </div>
</div>
</body>
</html>
