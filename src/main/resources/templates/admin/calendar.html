<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Content Calendar')}"></head>
<body>
<div class="admin-shell">

    <th:block th:replace="~{admin/layout :: sidebar('calendar')}"></th:block>

    <div class="admin-main">
        <th:block th:replace="~{admin/layout :: topbar('Content Calendar')}"></th:block>

        <div class="admin-body">

            <!-- Header row -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <a class="btn btn-outline btn-sm" th:href="@{/admin/calendar(month=${prevMonth})}"
                       title="Previous month"><i class="fas fa-chevron-left"></i></a>
                    <h2 style="font-size:18px;font-weight:700;min-width:180px;text-align:center;"
                        th:text="${monthLabel}">Month</h2>
                    <a class="btn btn-outline btn-sm" th:href="@{/admin/calendar(month=${nextMonth})}"
                       title="Next month"><i class="fas fa-chevron-right"></i></a>
                    <a class="btn btn-outline btn-sm" th:href="@{/admin/calendar}">Today</a>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
                        <span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;"></span> Published
                        <span style="width:10px;height:10px;border-radius:50%;background:var(--blue, #3b82f6);display:inline-block;margin-left:4px;"></span> Scheduled
                    </div>
                    <a th:href="@{/admin/blog/new}" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus"></i> New Post
                    </a>
                </div>
            </div>

            <!-- Calendar card -->
            <div class="card">
                <div class="card-body" style="padding:16px;">
                    <!-- Day headers -->
                    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;">
                        <div class="cal-day-header">Mon</div>
                        <div class="cal-day-header">Tue</div>
                        <div class="cal-day-header">Wed</div>
                        <div class="cal-day-header">Thu</div>
                        <div class="cal-day-header">Fri</div>
                        <div class="cal-day-header">Sat</div>
                        <div class="cal-day-header">Sun</div>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
                        <th:block th:if="${leadingBlanks > 0}">
                            <div class="cal-cell empty" th:each="i : ${#numbers.sequence(1, leadingBlanks)}"></div>
                        </th:block>
                        <div class="cal-cell" th:each="cell : ${days}"
                             style="min-height:84px;"
                             th:style="${cell.today} ? 'min-height:84px;background:var(--green-bg);border-color:var(--green);' : 'min-height:84px;'">
                            <span class="cal-day-num" th:classappend="${cell.today} ? ' today' : ''"
                                  th:text="${cell.day}">1</span>
                            <div th:if="${!cell.posts.isEmpty()}"
                                 style="margin-top:4px;display:flex;flex-direction:column;gap:2px;">
                                <a th:each="post : ${cell.posts}"
                                   th:href="@{/admin/blog/{id}/edit(id=${post.id})}"
                                   th:title="${post.title} + (${post.published} ? ' (published)' : ' (scheduled)')"
                                   th:style="'font-size:10px;font-weight:500;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;color:' + (${post.published} ? 'var(--green)' : 'var(--blue, #3b82f6)') + ';'">
                                    <span th:text="'● ' + ${post.title}">● Post</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="~{admin/layout :: darkModeScript}"></th:block>
</body>
</html>
