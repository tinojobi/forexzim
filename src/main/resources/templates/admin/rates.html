<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Live Rates')}"></head>
<body>
<div class="admin-shell">

    <th:block th:replace="~{admin/layout :: sidebar('rates')}"></th:block>

    <div class="admin-main">
        <th:block th:replace="~{admin/layout :: topbar('Live Rates')}"></th:block>

        <div class="admin-body">

            <!-- Rate History Chart -->
            <div class="card" style="margin-bottom:20px;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-chart-area"></i> Rate History</h2>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <select id="chartSource" class="form-control" style="width:160px;padding:5px 8px;font-size:13px;" onchange="loadChart()">
                            <option value="ZimPriceCheck">ZimPriceCheck</option>
                            <option value="RBZ">RBZ</option>
                            <option value="CBZ">CBZ</option>
                            <option value="FBC">FBC</option>
                            <option value="ExchangeRateApi">ExchangeRateApi</option>
                        </select>
                        <div style="display:flex;gap:4px;">
                            <button class="btn btn-sm btn-outline days-btn active" onclick="setDays(this,7)">7d</button>
                            <button class="btn btn-sm btn-outline days-btn" onclick="setDays(this,30)">30d</button>
                            <button class="btn btn-sm btn-outline days-btn" onclick="setDays(this,90)">90d</button>
                        </div>
                    </div>
                </div>
                <div class="card-body" style="padding-bottom:8px;">
                    <div id="rateHistoryChart"></div>
                    <div id="rateChartEmpty" class="empty-state" style="display:none;padding:32px 0;">
                        <i class="fas fa-chart-area"></i>
                        <p>No history data for this source / period.</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-chart-line"></i>
                        Latest Rates by Source
                    </h2>
                </div>

                <div class="table-wrap" th:if="${!rates.isEmpty()}">
                    <table>
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th>Currency Pair</th>
                                <th>Buy Rate</th>
                                <th>Sell Rate</th>
                                <th>Scraped At</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rate : ${rates}">
                                <td style="font-weight:500;" th:text="${rate.source.name}">Source</td>
                                <td>
                                    <span class="badge badge-gold" th:text="${rate.currencyPair}">USD/ZiG</span>
                                </td>
                                <td style="font-size:13px;">
                                    <span th:if="${rate.buyRate != null}" th:text="${rate.buyRate}">—</span>
                                    <span th:if="${rate.buyRate == null}" style="color:var(--light);">—</span>
                                </td>
                                <td style="font-size:13px;">
                                    <span th:if="${rate.sellRate != null}" th:text="${rate.sellRate}">—</span>
                                    <span th:if="${rate.sellRate == null}" style="color:var(--light);">—</span>
                                </td>
                                <td style="font-size:13px;color:var(--muted);"
                                    th:text="${#temporals.format(rate.scrapedAt, 'dd MMM yyyy, HH:mm')}">—</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${rates.isEmpty()}" class="empty-state">
                    <i class="fas fa-chart-line"></i>
                    <p>No rate data available yet. <a th:href="@{/admin}">Trigger a scrape</a> from the dashboard.</p>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
let chartDays = 7;
let chart = null;

async function loadChart() {
    const source = document.getElementById('chartSource').value;
    const empty  = document.getElementById('rateChartEmpty');
    try {
        const res  = await fetch('/api/rates/history?source=' + encodeURIComponent(source) + '&pair=USD%2FZiG&days=' + chartDays);
        const data = await res.json();
        if (!data.length) {
            empty.style.display = 'block';
            if (chart) { chart.destroy(); chart = null; }
            return;
        }
        empty.style.display = 'none';
        const labels = data.map(d => d.day);
        const values = data.map(d => parseFloat(d.avgRate));
        const opts = {
            chart:       { type: 'area', height: 180, toolbar: { show: false }, animations: { enabled: true, speed: 400 } },
            series:      [{ name: 'Avg Buy Rate', data: values }],
            xaxis:       { categories: labels, labels: { style: { fontSize: '11px', colors: '#94a3b8' } }, axisBorder: { show: false }, axisTicks: { show: false } },
            yaxis:       { labels: { style: { fontSize: '11px', colors: '#94a3b8' }, formatter: v => v.toFixed(2) }, min: 0, forceNiceScale: true },
            colors:      ['#16a34a'],
            fill:        { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.3, opacityTo: 0.03, stops: [0,100] } },
            stroke:      { curve: 'smooth', width: 2 },
            dataLabels:  { enabled: false },
            grid:        { borderColor: '#e2e8f0', strokeDashArray: 4, yaxis: { lines: { show: true } }, xaxis: { lines: { show: false } } },
            tooltip:     { theme: 'light', y: { formatter: v => v.toFixed(4) + ' ZiG' } },
            annotations: { yaxis: [] }
        };
        if (chart) { chart.updateOptions(opts); chart.updateSeries([{ data: values }]); }
        else { chart = new ApexCharts(document.getElementById('rateHistoryChart'), opts); chart.render(); }
    } catch (e) {
        empty.style.display = 'block';
    }
}

function setDays(btn, days) {
    chartDays = days;
    document.querySelectorAll('.days-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadChart();
}

loadChart();
</script>
<th:block th:replace="~{admin/layout :: darkModeScript}"></th:block>
</body>
</html>
