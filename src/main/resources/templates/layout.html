<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForexZim - Zimbabwe Forex Rates</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header th:fragment="header">
        <div class="container">
            <h1><i class="fas fa-chart-line"></i> ForexZim</h1>
            <p>Real‑time forex rates from Zimbabwean banks &amp; official sources</p>
        </div>
    </header>

    <main class="container">
        <div th:fragment="content">
            <!-- Content placeholder -->
            <div th:replace="this :: content">Content will be replaced by individual pages</div>
        </div>
    </main>

    <footer th:fragment="footer">
        <div class="container">
            <p>Data is updated every 30 minutes. Last scraped: <span th:text="${#dates.format(#dates.createNow(), 'dd MMM yyyy HH:mm')}">just now</span></p>
            <p class="disclaimer">Rates are indicative and may differ at the point of transaction. Use at your own discretion.</p>
            <p>&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> ForexZim • <a href="/api/rates/latest-grouped" target="_blank">API</a></p>
        </div>
    </footer>
</body>
</html>
